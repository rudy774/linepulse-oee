<svg width="960" height="364" viewBox="0 0 960 364" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Downtime Pareto</title><desc id="desc">Downtime reasons ranked by lost hours with cumulative downtime share.</desc>
<rect width="960" height="364" rx="18" fill="#F8FAFC"/>
<rect x="24" y="24" width="912" height="316" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
<text x="52" y="64" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Downtime Pareto</text>
<text x="52" y="94" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="15">Bars show each reason's share of downtime with lost-hour labels. The orange line shows cumulative downtime share.</text>
<text x="236" y="112" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Downtime share</text>
<text x="692" y="112" fill="#EA580C" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Cumulative share</text>
<line x1="236.0" y1="122.0" x2="848.0" y2="122.0" stroke="#E2E8F0"/>
<line x1="236.0" y1="122.0" x2="236.0" y2="268.0" stroke="#E2E8F0" stroke-dasharray="4 6"/>
<text x="236.0" y="304" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">0%</text>
<line x1="542.0" y1="122.0" x2="542.0" y2="268.0" stroke="#E2E8F0" stroke-dasharray="4 6"/>
<text x="542.0" y="304" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">50%</text>
<line x1="848.0" y1="122.0" x2="848.0" y2="268.0" stroke="#E2E8F0" stroke-dasharray="4 6"/>
<text x="848.0" y="304" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">100%</text>
<text x="52" y="151" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">die change</text>
<rect x="236" y="134.0" width="204.0" height="24" rx="5" fill="#2563EB"/>
<text x="450.0" y="151" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="13">0.33h</text>
<circle cx="440.0" cy="146.0" r="5" fill="#EA580C"/>
<text x="862" y="151" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="13">33.3%</text>
<text x="52" y="203" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">model change</text>
<rect x="236" y="186.0" width="204.0" height="24" rx="5" fill="#2563EB"/>
<text x="450.0" y="203" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="13">0.33h</text>
<circle cx="644.0" cy="198.0" r="5" fill="#EA580C"/>
<text x="862" y="203" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="13">66.7%</text>
<text x="52" y="255" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">waiting on fixtures</text>
<rect x="236" y="238.0" width="204.0" height="24" rx="5" fill="#2563EB"/>
<text x="450.0" y="255" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="13">0.33h</text>
<circle cx="848.0" cy="250.0" r="5" fill="#EA580C"/>
<text x="862" y="255" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="13">100.0%</text>
<path d="M 440.0 146.0 L 644.0 198.0 L 848.0 250.0" fill="none" stroke="#EA580C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="52" y="322" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">Top reason: die change at 0.33 lost hours. Shown reasons cover 100.0% of downtime.</text>
<text x="52" y="342" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">Generated from downtime interval evidence. Normalize reason codes before comparing lines or sites.</text>
</svg>
