<svg width="920" height="560" viewBox="0 0 920 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LinePulse OEE sample report</title>
  <desc id="desc">A terminal-style sample report showing OEE metrics and a downtime Pareto table for two manufacturing assets.</desc>
  <rect width="920" height="560" rx="18" fill="#111827"/>
  <rect x="24" y="24" width="872" height="512" rx="12" fill="#0B1220" stroke="#334155"/>
  <circle cx="52" cy="52" r="7" fill="#F87171"/>
  <circle cx="76" cy="52" r="7" fill="#FBBF24"/>
  <circle cx="100" cy="52" r="7" fill="#34D399"/>
  <text x="128" y="58" fill="#CBD5E1" font-family="Consolas, Menlo, monospace" font-size="16">linepulse analyze examples/machine_events.csv --pareto</text>
  <text x="48" y="104" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Asset Summary</text>
  <text x="48" y="138" fill="#93C5FD" font-family="Consolas, Menlo, monospace" font-size="15">Asset      OEE    Availability  Performance  Quality  Lost hours</text>
  <text x="48" y="168" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="15">Press-1    75.5%  87.9%         87.2%        98.5%    0.68</text>
  <text x="48" y="196" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="15">Welder-2   67.4%  77.8%         89.0%        97.3%    0.98</text>
  <text x="48" y="250" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Downtime Pareto</text>
  <text x="48" y="284" fill="#93C5FD" font-family="Consolas, Menlo, monospace" font-size="15">Reason               Lost hours  Share  Cumulative  Assets</text>
  <text x="48" y="318" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="15">die change           0.33        33.3%  33.3%       Press-1</text>
  <rect x="536" y="300" width="92" height="22" rx="4" fill="#2563EB"/>
  <text x="48" y="350" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="15">model change         0.33        33.3%  66.7%       Welder-2</text>
  <rect x="536" y="332" width="184" height="22" rx="4" fill="#0D9488"/>
  <text x="48" y="382" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="15">waiting on fixtures  0.33        33.3%  100.0%      Welder-2</text>
  <rect x="536" y="364" width="276" height="22" rx="4" fill="#D97706"/>
  <line x1="48" y1="424" x2="840" y2="424" stroke="#334155"/>
  <text x="48" y="464" fill="#CBD5E1" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">What this tells a plant team</text>
  <text x="48" y="494" fill="#94A3B8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Start improvement work with the largest lost-time reasons, then drill into affected assets.</text>
</svg>

